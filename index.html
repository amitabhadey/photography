---
layout: default
---

<!-- Wrapper -->
<div id="wrapper">

    <div id="site-logo-wrap">
        <img id="site-logo" src="{{ site.baseurl }}/logo.png" alt="Amitabha Dey logo" />
    </div>

    <!-- Main -->
    <div id="main" data-exif='{{ site.exif }}'>
        {% for image in site.static_files %}
        {% if image.path contains 'fulls' %}
        <article class="thumb">
            <a href="{{ site.baseurl }}{{ site.image_fulls_loc }}/{{ image.name }}" class="image">
                <img src="{{ site.baseurl }}{{ site.image_thumbs_loc }}/{{ image.name }}" alt=""
                     data-name="{{ image.name }}"/></a>
            <!--<h2></h2>
            <p></p>-->
        </article>
        {% endif %}
        {% endfor %}
    </div>

</div>

<footer id="site-min-footer">&copy; 2026 Amitabha Dey &bull; Photography, Films &amp; Stories. All Rights Reserved.</footer>
